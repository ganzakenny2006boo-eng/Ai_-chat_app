<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Assistant</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/16937/16937424.png">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* App Header */
        .header {
            padding: 50px 20px 15px 20px;
            background: #121212;
            border-bottom: 1px solid #222;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.5px;
        }
        .header span {
            display: block;
            font-size: 11px;
            color: #34c759;
            font-weight: 400;
            margin-top: 3px;
        }
        /* Chat History Box */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #0071e3;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .ai-message {
            background-color: #1c1c1e;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        /* Typing Box at Bottom */
        .input-container {
            padding: 12px 15px 30px 15px;
            background-color: #121212;
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input {
            flex: 1;
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        input::placeholder {
            color: #8e8e93;
        }
        button {
            background-color: #0071e3;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        button:active {
            background-color: #005bb5;
        }
    </style>
</head>
<body>

    <div class="header">
        AI Intelligence Platform
        <span>● Always Active</span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            Hello! I am your custom AI assistant. Ask me anything, and let's start talking!
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Ask something..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        // Allow pressing 'Enter' on phone keyboard to send
        userInput.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            // 1. Add User Message to Screen
            appendMessage(text, 'user-message');
            userInput.value = "";

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 2. Trigger AI response
            setTimeout(() => {
                getAIResponse(text);
            }, 800);
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function getAIResponse(userText) {
            let reply = "That's an interesting point! I am processing your input and learning from what you say.";
            
            if (userText.toLowerCase().includes('hello') || userText.toLowerCase().includes('hi')) {
                reply = "Hello there! How is your day going?";
            } else if (userText.toLowerCase().includes('your name')) {
                reply = "I am your custom-built AI platform running straight from Vercel!";
            } else if (userText.toLowerCase().includes('help')) {
                reply = "Tell me what you need assistance with, and I will guide you through it.";
            }

            appendMessage(reply, 'ai-message');
        }
    </script>
</body>
</html>
